<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Store | 프리미엄 꿈의악마 쇼핑몰</title>
    <style>
        /* 기본 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #f4f7f9; color: #333; }
        a { text-decoration: none; color: inherit; }

        /* 헤더 영역 */
        header { background-color: #0056b3; color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        nav ul { list-style: none; display: flex; gap: 20px; }
        
        /* 메인 배너 */
        .hero { background: linear-gradient(rgba(0, 86, 179, 0.8), rgba(0, 86, 179, 0.8)), url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=1200&q=80'); background-size: cover; height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }

        /* 상품 리스트 영역 */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .section-title { border-left: 5px solid #0056b3; padding-left: 10px; margin-bottom: 25px; font-size: 1.2rem; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .product-card { background: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        /* 이미지 영역 수정: img 태그가 영역에 꽉 차도록 설정 */
        .product-img { width: 100%; height: 200px; overflow: hidden; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }

        .product-info { padding: 15px; }
        .product-name { font-weight: bold; margin-bottom: 8px; font-size: 1.1rem; }
        .price { color: #0056b3; font-weight: bold; font-size: 1.2rem; }
        .buy-btn { width: 100%; background-color: #0056b3; color: white; border: none; padding: 10px; border-radius: 4px; margin-top: 10px; cursor: pointer; }
        .buy-btn:hover { background-color: #003d82; }

        /* 푸터 */
        footer { background-color: #333; color: #ccc; padding: 40px 5%; text-align: center; margin-top: 50px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">BLUE STORE</div>
        <nav>
            <ul>
                <li>홈</li>
                <li>베스트</li>
                <li>카테고리</li>
                <li>마이페이지</li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>Summer Blue Sale</h1>
        <p> 최대 50% 할인 이벤트 진행 중</p>
    </section>

    <main class="container">
        <h2 class="section-title">추천 상품</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="product-img">
                    <img src="텔러.jpg" alt="추억">
                </div>
                <div class="product-info">
                    <div class="product-name">추억</div>
                    <div class="price">39,000원</div>
                    <button class="buy-btn">장바구니 담기</button>
                </div>
            </div>
            <div class="product-card">
                <div class="product-img">
                    <img src="싸이클.jpg" alt="예습과복습">
                </div>
                <div class="product-info">
                    <div class="product-name">예습과복습</div>
                    <div class="price">55,000원</div>
                    <button class="buy-btn">장바구니 담기</button>
                </div>
            </div>
            <div class="product-card">
                <div class="product-img">
                    <img src="로베.jpg" alt="연애와사랑">
                </div>
                <div class="product-info">
                    <div class="product-name">연애와사랑</div>
                    <div class="price">22,000원</div>
                    <button class="buy-btn">장바구니 담기</button>
                </div>
            </div>
            <div class="product-card">
                <div class="product-img">
                    <img src="나이트메어.jpg" alt="악몽">
                </div>
                <div class="product-info">
                    <div class="product-name">악몽</div>
                    <div class="price">89,000원</div>
                    <button class="buy-btn">장바구니 담기</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>(주) 꿈의악마스토어 | 대표자: 록템이(박시유) |</p>
        <p>&copy; 2024 Blue Store. All rights reserved.</p>
    </footer>

</body>
</html>
