<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CRITICAL ERROR</title>

<style>
body{
    margin:0;
    background:black;
    color:red;
    font-family:monospace;
    text-align:center;
    overflow:hidden;
}

.shake{
    animation:shake 0.1s infinite;
}

@keyframes shake{
    0%{transform:translate(0,0)}
    25%{transform:translate(5px,-5px)}
    50%{transform:translate(-5px,5px)}
    75%{transform:translate(5px,5px)}
    100%{transform:translate(0,0)}
}

#title{
    font-size:50px;
    margin-top:120px;
    animation:flash 0.15s infinite;
}

@keyframes flash{
    0%{color:red}
    50%{color:white}
    100%{color:red}
}

#barBox{
    width:80%;
    height:25px;
    border:2px solid red;
    margin:30px auto;
}

#bar{
    height:100%;
    width:0%;
    background:red;
}

#log{
    color:lime;
    height:200px;
    overflow:hidden;
}

#input{
    margin-top:20px;
    padding:10px;
    font-size:18px;
    width:300px;
    text-align:center;
}
</style>
</head>

<body>

<div id="title">⚠ SYSTEM BREACH ⚠</div>

<div id="barBox"><div id="bar"></div></div>

<div id="log"></div>

<input id="input" placeholder="명령어 입력..." />

<script>

document.documentElement.requestFullscreen().catch(()=>{})

let bar = document.getElementById("bar")
let log = document.getElementById("log")
let input = document.getElementById("input")

let progress = 0
let unlocked = false

function update(){
    if(progress < 100 && !unlocked){
        progress += Math.random()*4
        bar.style.width = progress + "%"
        setTimeout(update,200)
    } else if(!unlocked){
        scaryPhase()
    }
}

function logs(){
    let msgs = [
    "보안 우회 중...",
    "시스템 접근...",
    "카메라 연결...",
    "사용자 식별...",
    "데이터 전송..."
    ]
    let msg = msgs[Math.floor(Math.random()*msgs.length)]
    log.innerHTML += "<div>> "+msg+"</div>"
    log.scrollTop = log.scrollHeight
    if(!unlocked) setTimeout(logs,300)
}

// 👉 비밀 코드
input.addEventListener("input", function(){
    if(input.value.trim().toUpperCase() === "SMG4"){
        unlocked = true
        unlockSequence()
    }
})

setTimeout(update,1000)
setTimeout(logs,1000)

function scaryPhase(){
    document.body.classList.add("shake")

    setTimeout(()=>{
        if(unlocked) return
        document.body.style.background="white"
        document.body.style.color="black"
        document.body.innerHTML =
        "<h1 style='margin-top:200px;font-size:50px'>죽기전에 너의 얼굴을 보고싶어...</h1>"
    },3000)

    setTimeout(()=>{
        if(unlocked) return
        document.body.style.background="black"
        document.body.style.color="red"
        document.body.innerHTML =
        "<h1 style='margin-top:200px;font-size:60px'>접속 종료 중...</h1>"
    },10000)
}

// 👉 해제 성공 연출
function unlockSequence(){
    document.body.classList.remove("shake")
    document.body.style.background="black"
    document.body.style.color="lime"
    document.body.innerHTML =
    "<h1 style='margin-top:200px'>접근 코드 확인됨</h1><p>시스템 복구 중...</p>"

    setTimeout(()=>{
        document.body.innerHTML =
        "<h1 style='margin-top:200px'>접속 종료됨</h1>"
    },3000)
}

</script>

</body>
</html>
